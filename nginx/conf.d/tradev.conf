# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name tradev.kr www.tradev.kr;

    # Let's Encrypt 인증 갱신용
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    http2 on;
    server_name tradev.kr www.tradev.kr;

    # SSL 인증서 (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/tradev.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradev.kr/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health Check (내부용)
    location /health {
        access_log off;
        proxy_pass http://tradev_app/actuator/health;
        proxy_set_header Host $host;
    }

    # API — SSE (스트리밍, 버퍼 비활성)
    location ~ ^/api/(notifications/subscribe|ai/item-description) {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://tradev_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # SSE 필수: 버퍼링 해제
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API — WebSocket (채팅)
    location /ws/ {
        proxy_pass http://tradev_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # API — 인증 엔드포인트 (Rate Limit 강화)
    location ~ ^/api/auth/(login|signup|refresh) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://tradev_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API — 일반
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://tradev_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Admin API
    location /admin/ {
        # 내부 IP만 허용 (선택사항, 주석 해제 시 적용)
        # allow 10.0.0.0/8;
        # deny all;

        limit_req zone=api burst=10 nodelay;

        proxy_pass http://tradev_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 정적 파일 (프론트엔드 — nginx에서 직접 서빙하는 경우)
    # location / {
    #     root /usr/share/nginx/html;
    #     try_files $uri $uri/ /index.html;
    #     expires 1d;
    #     add_header Cache-Control "public, no-transform";
    # }

    # 현재: 프론트엔드도 Spring Boot에서 서빙
    location / {
        proxy_pass http://tradev_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
