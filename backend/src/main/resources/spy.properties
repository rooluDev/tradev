# P6Spy 설정 — 슬로우 쿼리 감지 (1000ms 이상)
modulelist=com.p6spy.engine.spy.P6SpyFactory
appender=com.p6spy.engine.spy.appender.Slf4JLogger
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat
customLogMessageFormat=%(executionTime)ms | %(sql)

# 1000ms 이상인 쿼리만 로깅
executionThreshold=1000

# 로그 레벨 (WARN으로 설정 — 느린 쿼리만 경고 출력)
logLevel=warn

# 로컬 환경에서는 모든 SQL 출력 (spy.properties 는 공통; 프로파일별 제어는 아래)
# 개발 시: executionThreshold=0 으로 변경하면 전체 출력
