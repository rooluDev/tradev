spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/tradev_test?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD:test}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password:

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

jwt:
  secret: test-secret-key-must-be-at-least-32-characters-long
  access-expiry: 3600000
  refresh-expiry: 604800000

aws:
  s3:
    access-key: test-access-key
    secret-key: test-secret-key
    region: ap-northeast-2
    bucket: test-bucket
    base-url: http://localhost:9000
  endpoint: http://localhost:9000

claude:
  api-key: test-api-key
  model: claude-sonnet-4-6
  max-tokens: 1024

logging:
  level:
    com.tradev: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    root: WARN
