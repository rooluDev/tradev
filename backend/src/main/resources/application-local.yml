spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  sql:
    init:
      mode: always

  data:
    redis:
      password: ""

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy-local
            client-secret: dummy-local

aws:
  s3:
    access-key: minioadmin
    secret-key: minioadmin
    region: ap-northeast-2
    bucket: tradev-local
    base-url: http://localhost:9000/tradev-local
  endpoint: http://localhost:9000

jwt:
  secret: local-dev-secret-key-must-be-at-least-32-bytes

mail:
  from: noreply@tradev.local

logging:
  level:
    com.tradev: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      log-format: "%-5p [%d{HH:mm:ss}] [%connection] | %s | Execution: %r ms | Row: %u"
