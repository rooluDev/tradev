spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: tradev

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/tradev?characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${MYSQL_USERNAME:tradev}
    password: ${MYSQL_PASSWORD:tradev}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope: profile,email
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/google"

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mail:
  from: ${MAIL_FROM:noreply@tradev.shop}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.tradev.domain
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}
  access-expiry: ${JWT_ACCESS_EXPIRY:3600000}
  refresh-expiry: ${JWT_REFRESH_EXPIRY:604800000}

aws:
  s3:
    access-key: ${AWS_S3_ACCESS_KEY:}
    secret-key: ${AWS_S3_SECRET_KEY:}
    region: ${AWS_S3_REGION:ap-northeast-2}
    bucket: ${AWS_S3_BUCKET:}
    base-url: ${AWS_S3_BASE_URL:}
  endpoint: ${AWS_ENDPOINT:}

claude:
  api-key: ${CLAUDE_API_KEY:}
  model: ${CLAUDE_MODEL:claude-sonnet-4-6}
  max-tokens: ${CLAUDE_MAX_TOKENS:1024}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

server:
  port: ${SERVER_PORT:8080}
