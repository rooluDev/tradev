services:
  app:
    image: ${DOCKER_IMAGE:-tradev-app}:latest
    container_name: tradev-app
    restart: unless-stopped
    env_file:
      - backend/.env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - tradev-net

  mysql:
    image: mysql:8.0
    container_name: tradev-mysql
    restart: unless-stopped
    env_file:
      - mysql/.env.mysql
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - tradev-net

  redis:
    image: redis:7-alpine
    container_name: tradev-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - tradev-net

  nginx:
    image: nginx:alpine
    container_name: tradev-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - tradev-net

volumes:
  mysql-data:
  redis-data:
  nginx-logs:

networks:
  tradev-net:
    driver: bridge
