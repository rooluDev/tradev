name: Deploy

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tradev-app

jobs:
  # ──────────── 1. Test ────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tradev_test
          MYSQL_USER: tradev
          MYSQL_PASSWORD: tradev
        ports: [ "3306:3306" ]
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: [ "6379:6379" ]
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'gradle' }
      - run: chmod +x backend/gradlew
      - name: Run tests
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/tradev_test?useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: tradev
          SPRING_DATASOURCE_PASSWORD: tradev
          SPRING_DATA_REDIS_HOST: localhost
          JWT_SECRET: test-secret-key-must-be-at-least-32-bytes-long
          CLAUDE_API_KEY: dummy-for-test
          AWS_S3_ACCESS_KEY: dummy
          AWS_S3_SECRET_KEY: dummy
          AWS_S3_BUCKET: dummy
          AWS_S3_BASE_URL: http://localhost
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          MAIL_FROM: test@tradev.local
        run: ./gradlew test --no-daemon

  # ──────────── 2. Build & Push Docker Image ────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'gradle' }

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend dist to backend static
        run: |
          mkdir -p backend/src/main/resources/static
          cp -r frontend/dist/. backend/src/main/resources/static/

      - name: Build JAR (includes frontend static)
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────── 3. Deploy to EC2 ────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/tradev

            # 최신 코드 반영 (로컬 수정사항 무시하고 origin/main 으로 강제 동기화)
            git fetch origin
            git reset --hard origin/main

            # .env.prod 최신화
            {
              echo "MYSQL_URL=${{ secrets.MYSQL_URL }}"
              echo "MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}"
              echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}"
              echo "REDIS_HOST=${{ secrets.REDIS_HOST }}"
              echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
              echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
              echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}"
              echo "AWS_S3_ACCESS_KEY=${{ secrets.AWS_S3_ACCESS_KEY }}"
              echo "AWS_S3_SECRET_KEY=${{ secrets.AWS_S3_SECRET_KEY }}"
              echo "AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}"
              echo "AWS_S3_BASE_URL=${{ secrets.AWS_S3_BASE_URL }}"
              echo "MAIL_HOST=${{ secrets.MAIL_HOST }}"
              echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}"
              echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}"
              echo "MAIL_FROM=${{ secrets.MAIL_FROM }}"
            } > backend/.env.prod
            chmod 600 backend/.env.prod

            # mysql/.env.mysql 최신화
            {
              echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_PASSWORD }}"
              echo "MYSQL_DATABASE=tradev"
              echo "MYSQL_USER=tradev"
              echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}"
            } > mysql/.env.mysql
            chmod 600 mysql/.env.mysql

            # 최신 이미지 pull
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            # 이전 앱 컨테이너 중지 및 제거
            docker stop tradev-app 2>/dev/null || true
            docker rm   tradev-app 2>/dev/null || true

            # 새 앱 컨테이너 시작
            # --network-alias app : nginx의 proxy_pass $app_upstream(http://app:8080) 에서 찾을 수 있도록
            docker run -d \
              --name tradev-app \
              --network tradev_tradev-net \
              --network-alias app \
              --env-file backend/.env.prod \
              -e SPRING_PROFILES_ACTIVE=prod \
              -p 8080:8080 \
              --restart unless-stopped \
              ${{ env.DOCKER_IMAGE }}:latest

            # Health check (최대 90초 대기 — Spring Boot 기동 시간 고려)
            for i in $(seq 1 18); do
              sleep 5
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i)"
                break
              fi
              echo "Waiting... attempt $i/18 (status=$STATUS)"
              if [ $i -eq 18 ]; then
                echo "Health check failed after 90s"
                docker compose logs --tail=50 app
                exit 1
              fi
            done

            # Nginx 설정 리로드 (conf 변경 시 반영)
            docker exec tradev-nginx nginx -s reload || true

            # 이미지 정리
            docker image prune -f
