name: Deploy

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tradev-app

jobs:
  # ──────────── 1. Test ────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tradev_test
          MYSQL_USER: tradev
          MYSQL_PASSWORD: tradev
        ports: [ "3306:3306" ]
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: [ "6379:6379" ]
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'gradle' }
      - run: chmod +x backend/gradlew
      - name: Run tests
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/tradev_test?useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: tradev
          SPRING_DATASOURCE_PASSWORD: tradev
          SPRING_DATA_REDIS_HOST: localhost
          JWT_SECRET: test-secret-key-must-be-at-least-32-bytes-long
          CLAUDE_API_KEY: dummy-for-test
          AWS_S3_ACCESS_KEY: dummy
          AWS_S3_SECRET_KEY: dummy
          AWS_S3_BUCKET: dummy
          AWS_S3_BASE_URL: http://localhost
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          MAIL_FROM: test@tradev.local
        run: ./gradlew test --no-daemon

  # ──────────── 2. Build & Push Docker Image ────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'gradle' }

      - name: Build JAR
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar --no-daemon

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend dist to backend static
        run: |
          mkdir -p backend/src/main/resources/static
          cp -r frontend/dist/. backend/src/main/resources/static/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────── 3. Deploy to EC2 ────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/tradev

            # .env.prod 최신화
            cat > backend/.env.prod << ENVEOF
MYSQL_URL=${{ secrets.MYSQL_URL }}
MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}
MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
REDIS_HOST=${{ secrets.REDIS_HOST }}
REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
JWT_SECRET=${{ secrets.JWT_SECRET }}
GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
AWS_S3_ACCESS_KEY=${{ secrets.AWS_S3_ACCESS_KEY }}
AWS_S3_SECRET_KEY=${{ secrets.AWS_S3_SECRET_KEY }}
AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
AWS_S3_BASE_URL=${{ secrets.AWS_S3_BASE_URL }}
MAIL_HOST=${{ secrets.MAIL_HOST }}
MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
MAIL_FROM=${{ secrets.MAIL_FROM }}
ENVEOF
            chmod 600 backend/.env.prod

            # mysql/.env.mysql 최신화
            cat > mysql/.env.mysql << MYSQLEOF
MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
MYSQL_DATABASE=tradev
MYSQL_USER=tradev
MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
MYSQLEOF
            chmod 600 mysql/.env.mysql

            # 최신 이미지 pull
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            # Blue-Green 무중단 배포
            CURRENT=$(docker ps --filter "name=tradev-app" --format "{{.Names}}" | head -1)
            if [ -z "$CURRENT" ] || [[ "$CURRENT" == *"blue"* ]]; then
              NEW_COLOR=green; OLD_COLOR=blue
            else
              NEW_COLOR=blue; OLD_COLOR=green
            fi

            # 새 컨테이너 시작
            docker run -d \
              --name tradev-app-${NEW_COLOR} \
              --env-file backend/.env.prod \
              -e SPRING_PROFILES_ACTIVE=prod \
              -p 8081:8080 \
              --restart unless-stopped \
              ${{ env.DOCKER_IMAGE }}:latest

            # Health check (최대 60초)
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/actuator/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "Health check failed, rolling back"
                docker stop tradev-app-${NEW_COLOR} && docker rm tradev-app-${NEW_COLOR}
                exit 1
              fi
            done

            # Nginx 포트 전환
            sed -i "s/808[01]/8081/g" /etc/nginx/conf.d/tradev.conf || true
            nginx -s reload

            # 이전 컨테이너 제거
            docker stop tradev-app-${OLD_COLOR} 2>/dev/null || true
            docker rm tradev-app-${OLD_COLOR} 2>/dev/null || true

            # 이미지 정리
            docker image prune -f
