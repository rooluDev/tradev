name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tradev_test
          MYSQL_USER: tradev
          MYSQL_PASSWORD: tradev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Run tests
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/tradev_test?useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: tradev
          SPRING_DATASOURCE_PASSWORD: tradev
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-must-be-at-least-32-bytes-long
          CLAUDE_API_KEY: dummy-for-test
          AWS_S3_ACCESS_KEY: dummy
          AWS_S3_SECRET_KEY: dummy
          AWS_S3_BUCKET: dummy
          AWS_S3_BASE_URL: http://localhost
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          MAIL_FROM: test@tradev.local
        run: ./gradlew test --no-daemon

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-report
          path: backend/build/reports/tests/

      - name: Frontend install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
